
server:
  port: 9091
  servlet:
    context-path: /xxl-job-admin

spring:

  # 动态读取配置文件；如 当前maven设置profiles.active为dev，则为：active:dev
  profiles:
    active: @profiles.active@

  application:
    name: flycloud-xxljob-admin


  mvc:
    servlet:
      load-on-startup: 0
    static-path-pattern: /static/**

  web:
    resources:
      static-locations: classpath:/static/

  freemarker:
    template-loader-path: classpath:/templates/
    suffix: .ftl
    charset: UTF-8
    request-context-attribute: request
    settings:
      number_format: 0.##########
      new_builtin_class_resolver: safer

  datasource:
    type: com.zaxxer.hikari.HikariDataSource
    url: ${XXL_JOB_DATASOURCE_URL:jdbc:mysql://127.0.0.1:3306/fly_job?useUnicode=true&characterEncoding=UTF-8&useSSL=false&serverTimezone=Asia/Shanghai}
    username: ${XXL_JOB_DATASOURCE_USERNAME:root}
    password: ${XXL_JOB_DATASOURCE_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 10
      maximum-pool-size: 30
      auto-commit: true
      idle-timeout: 30000
      pool-name: HikariCP
      max-lifetime: 900000
      connection-timeout: 10000
      connection-test-query: SELECT 1
      validation-timeout: 1000

  mail:
    host: ${XXL_JOB_MAIL_HOST:smtp.qq.com}
    port: ${XXL_JOB_MAIL_PORT:25}
    username: ${XXL_JOB_MAIL_USERNAME:}
    from: ${XXL_JOB_MAIL_FROM:}
    password: ${XXL_JOB_MAIL_PASSWORD:}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true
      mail.smtp.starttls.required: true
      mail.smtp.socketFactory.class: javax.net.ssl.SSLSocketFactory

management:
  endpoints:
    web:
      base-path: /actuator
  health:
    mail:
      enabled: false

mybatis:
  mapper-locations: classpath:/mapper/*Mapper.xml

xxl:
  job:
    accessToken: ${XXL_JOB_ACCESS_TOKEN}
    timeout: 3
    i18n: zh_CN
    triggerpool:
      fast:
        max: 200
      slow:
        max: 100
    logretentiondays: 30
xxl-sso:
  token:
    key: xxl_job_login_token
    timeout: 604800000
  client:
    excluded:
      paths: ''
    login:
      path: /auth/login
