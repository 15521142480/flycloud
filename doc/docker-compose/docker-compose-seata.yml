# Seata 基础设施增量编排。
# 与现有 docker-compose.yaml 联合执行：
# docker compose -f /Users/lxs/Downloads/docker-compose.yaml -f docker-compose-seata.yml up -d
#
# 部署前准备：
#   1. 执行 db/mysql/表结构/seata-server-mysql8.sql；
#   2. 在 Nacos 导入 doc/nacos-example/application-common.yaml；其中包含 flycloud.seata 客户端参数；
#   3. 将 seata/application.yml 和 seata.env.example 分别复制到
#      /docker/seata/config/application.yml、/docker/seata/config/seata.env，并填好 seata.env；
#   4. Seata 2.5.0 镜像不内置 MySQL 驱动。创建目录并下载项目统一使用的 Connector/J 9.4.0：
#      mkdir -p /docker/seata/config/jdbc
#      curl -fL --retry 3 \
#        -o /docker/seata/config/jdbc/mysql-connector-j-9.4.0.jar \
#        https://repo1.maven.org/maven2/com/mysql/mysql-connector-j/9.4.0/mysql-connector-j-9.4.0.jar
#      chmod 644 /docker/seata/config/jdbc/mysql-connector-j-9.4.0.jar
#      ls -lh /docker/seata/config/jdbc/
#      MySQL 服务端为 8.4.10 时可继续使用该 JDBC 驱动，无需要求两者版本完全相同；
#   5. 创建 /docker/seata/logs 目录。

services:


  # seata 服务配置
  seata_one:
    image: apache/seata-server:2.5.0
    container_name: seata_one
    env_file:
      - /docker/seata/config/seata.env
    environment:
      TZ: Asia/Shanghai
      # 服务器内存较小，覆盖 Seata 镜像默认的 2G JVM 参数
      JVM_XMS: 256m
      JVM_XMX: 512m
      JVM_XSS: 512k
      JVM_MetaspaceSize: 96m
      JVM_MaxMetaspaceSize: 256m
      JVM_MaxDirectMemorySize: 256m

    volumes:
      # 启动引导配置：只读挂载，避免容器内配置漂移。
      - /docker/seata/config/application.yml:/seata-server/resources/application.yml:ro
      # Seata 2.5.0 镜像不会内置 MySQL 驱动；其 loader.path=/lib，驱动必须位于 /lib/jdbc。
      - /docker/seata/config/jdbc:/lib/jdbc:ro
      # 事务协调器日志：持久化到宿主机，便于日志采集与排障。
      - /docker/seata/logs:/seata-server/logs
    ports:
      # 业务服务连接 Seata TC端口
      - "8091:8091"
      # 控制台服务，新版需独立部署
      # - "127.0.0.1:7091:7091"
    # mysql、nacos、seata同一台服务器可以这么写 -> url: jdbc:mysql://mysql_one:3306/fly_seata、nacos_one:8848；如果不是删除depends_on配置
    depends_on:
      - mysql_one
      - nacos_one
    restart: always
