# Seata Server 2.5.0 启动引导配置。
# 此文件必须以只读方式挂载到容器；TC 需要先用它连接 Nacos，才能读取 flycloud-seata-client.yaml。

# Seata 2.5.0 中，事务协调器 TC（seata-server:8091）与 Console/原生注册中心
# （seata-naming-server:8081）已拆分。业务客户端 TM/RM 不需要独立部署，它们运行在
# flycloud-mall 等业务服务内。本项目采用 Nacos 注册中心，未部署 naming-server 时不提供
# Seata Console；如需 Console，再独立增加 apache/seata-naming-server 服务。

spring:
  application:
    name: seata-server
  main:
    web-application-type: none

logging:
  config: classpath:logback-spring.xml
  file:
    path: ${SEATA_LOG_PATH:/seata-server/logs}


seata:

  server:
    # 业务服务连接 TC 的端口
    service-port: ${SEATA_PORT:8091}

  # Seata Server 注册到 Nacos
  # TC 自身注册到 Nacos，客户端通过此服务发现 TC 地址。
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: ${NACOS_SERVER_ADDR:nacos_one:8848}
      namespace: ${NACOS_NAMESPACE:}
      group: ${SEATA_NACOS_GROUP:SEATA_GROUP}
      cluster: default
      username: ${NACOS_USERNAME}
      password: ${NACOS_PASSWORD}

  # TC 的数据库启动参数必须在本地引导文件中提供，不能依赖尚未启动的 TC 自己从 Nacos 获取。
  # 业务客户端的事务路由和 AT 参数放在 Nacos 的 flycloud-seata-client.yaml 中。
#  config:
#    type: nacos

  # TC 事务日志持久化。fly_seata 是 Seata 专用库，不与任何业务库共用。
  store:
    mode: db
    lock:
      mode: db
    session:
      mode: db
    db:
      datasource: druid
      dbType: mysql
      driverClassName: com.mysql.cj.jdbc.Driver
      # Docker 网络内访问 MySQL，禁止填写 localhost 或宿主机 127.0.0.1。
      url: jdbc:mysql://${SEATA_DB_HOST}:${SEATA_DB_PORT:3306}/${SEATA_DB_NAME}?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia%2FShanghai&rewriteBatchedStatements=true
      user: ${SEATA_DB_USERNAME}
      password: ${SEATA_DB_PASSWORD}
      minConn: 10
      maxConn: 100
      globalTable: global_table
      branchTable: branch_table
      lockTable: lock_table
      distributedLockTable: distributed_lock
      vgroupTable: vgroup_table
      queryLimit: 100
      maxWait: 5000
      druid:
        timeBetweenEvictionRunsMillis: 120000
        minEvictableIdleTimeMillis: 300000
        testWhileIdle: true
        testOnBorrow: false
        keepAlive: false


  # Seata Console 登录账号。密码与安全密钥由 /docker/config/seata/seata.env 提供。
  #console:
  #  user:
  #    username: ${SEATA_CONSOLE_USERNAME}
  #    password: ${SEATA_CONSOLE_PASSWORD}


  # Console / REST 接口鉴权。生产环境必须提供高强度随机密钥（openssl rand -base64 48）。
#  security:
#    secretKey: ${SEATA_SECURITY_SECRET_KEY}
#    tokenValidityInMilliseconds: 1800000
