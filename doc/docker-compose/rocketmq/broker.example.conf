# 单机 RocketMQ Broker 配置；brokerIP1 必须填写业务服务可访问的宿主机内网 IP。
brokerClusterName=FlycloudRocketMqCluster
brokerName=broker-a
brokerId=0
# 示例文件仅使用本地回环地址；真实部署时在非 example 的 broker.conf 中改为宿主机内网 IP。
brokerIP1=127.0.0.1
listenPort=10911
autoCreateTopicEnable=false
brokerRole=ASYNC_MASTER
flushDiskType=ASYNC_FLUSH
storePathRootDir=/home/rocketmq/store
storePathCommitLog=/home/rocketmq/store/commitlog
