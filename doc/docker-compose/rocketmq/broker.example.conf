# 单机 RocketMQ Broker 配置；brokerIP1 会注册到 NameServer，并被返回给 Producer/Consumer 用于直连 Broker。
# 必须填写所有实际客户端可访问的地址：本地客户端使用公网可达地址，同一 VPC 客户端使用内网地址。
brokerClusterName=FlycloudRocketMqCluster
brokerName=broker-a
brokerId=0
# 示例文件仅使用本地回环地址；真实部署时在非 example 的 broker.conf 中按客户端网络改为公网或内网可达地址。
brokerIP1=127.0.0.1
listenPort=10911
autoCreateTopicEnable=false
brokerRole=ASYNC_MASTER
flushDiskType=ASYNC_FLUSH
storePathRootDir=/home/rocketmq/store
storePathCommitLog=/home/rocketmq/store/commitlog
