# 与主 docker-compose.yaml 联合使用：
# docker compose -f /Users/lxs/Downloads/docker-compose.yaml -f docker-compose-rocketmq.yml up -d
# 部署前：
#   1. 复制 rocketmq/broker.example.conf 到 /docker/rocketmq/config/broker.conf，并将 ROCKETMQ_BROKER_IP 替换为宿主机内网 IP；
#   2. RocketMQ 5.3.3 镜像以 UID/GID 3000 运行，必须预创建并授权持久化目录：
#      install -d -o 3000 -g 3000 /docker/rocketmq/data/broker/store \
#        /docker/rocketmq/logs/namesrv /docker/rocketmq/logs/broker
services:


  # RocketMQ 服务配置（NameServer、Broker）
  # namesrv服务（名称服务）；不保存信息，只负责定位：Broker位置、Topic位置、路由信息
  rocketmq_namesrv:
    image: apache/rocketmq:5.3.3
    container_name: rocketmq_namesrv
    command: sh mqnamesrv
    environment:
      TZ: Asia/Shanghai
      # 个人低负载单机基线。镜像默认 NameServer 堆为 4G，必须显式覆盖。
      JAVA_OPT_EXT: "-Xms64m -Xmx128m -Xss512k -XX:MetaspaceSize=64m -XX:MaxMetaspaceSize=128m -XX:MaxDirectMemorySize=64m"
    # 堆以外仍会产生元空间、线程栈与 JVM Native Memory，保留必要余量。
    mem_limit: 384m
    ports:
      - "9876:9876"
    volumes:
      - /docker/rocketmq/logs/namesrv:/home/rocketmq/logs
    restart: always


  # broker服务（消息代理服务）；负责保存消息：发送消息、消费消息、重试消息、删除消息
  rocketmq_broker:
    image: apache/rocketmq:5.3.3
    container_name: rocketmq_broker
    command: sh mqbroker -n rocketmq_namesrv:9876 -c /home/rocketmq/rocketmq-5.3.3/conf/broker.conf
    environment:
      TZ: Asia/Shanghai
      NAMESRV_ADDR: rocketmq_namesrv:9876
      # 个人低负载单机基线。Broker 镜像默认堆为 8G、MaxDirectMemorySize 为 15G，必须同时覆盖。
      JAVA_OPT_EXT: "-Xms128m -Xmx256m -Xmn64m -Xss512k -XX:MetaspaceSize=64m -XX:MaxMetaspaceSize=128m -XX:MaxDirectMemorySize=128m"
    # 256M 最大堆以外仍需容纳 Direct Memory、元空间、线程栈及消息文件页缓存。
    mem_limit: 768m
    depends_on:
      - rocketmq_namesrv
    ports:
      - "10909:10909"
      - "10911:10911"
      - "10912:10912"
    volumes:
      - /docker/rocketmq/config/broker.conf:/home/rocketmq/rocketmq-5.3.3/conf/broker.conf:ro
      - /docker/rocketmq/data/broker/store:/home/rocketmq/store
      - /docker/rocketmq/logs/broker:/home/rocketmq/logs
    restart: always
