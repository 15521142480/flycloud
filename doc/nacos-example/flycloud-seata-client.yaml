# ============================================================================
# Seata Client 公共配置
#
# Nacos：
# dataId = flycloud-seata-client.yaml
# group  = SEATA_GROUP
# format = YAML
#
# 仅供业务服务客户端 TM/RM 使用。
# Seata Server 的数据库、恢复任务、监控配置放在它自己的 application.yml。
# ============================================================================

# 事务组路由
service:
  vgroupMapping:
    flycloud-tx-group: default
  enableDegrade: false
  disableGlobalTransaction: false

# AT 客户端配置
client:
  rm:
    asyncCommitBufferLimit: 10000
    reportRetryCount: 5
    tableMetaCheckEnable: true
    tableMetaCheckerInterval: 60000
    sqlParserType: druid
    reportSuccessEnable: false

    lock:
      retryInterval: 10
      retryTimes: 30
      retryPolicyBranchRollbackOnConflict: true

  tm:
    commitRetryCount: 5
    rollbackRetryCount: 5
    defaultGlobalTransactionTimeout: 60000
    degradeCheck: false
    degradeCheckPeriod: 2000
    degradeCheckAllowTimes: 10

  undo:
    dataValidation: true
    logSerialization: jackson
    logTable: undo_log
    onlyCareUpdateColumns: true

    compress:
      enable: true
      type: zip
      threshold: 64k