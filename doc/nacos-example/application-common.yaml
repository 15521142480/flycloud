
# ========================================================= spring 相关配置

spring:
  # 资源信息
  messages:
    # 国际化资源文件路径
    basename: i18n/messages
  servlet:
    multipart:
      # 单个文件大小
      max-file-size: 1000MB
      # 设置总上传的文件大小
      max-request-size: 5000MB

  # bean重名覆盖
  main:
    allow-bean-definition-overriding: true
    allow-circular-references: true

  mvc:
    format:
      date-time: yyyy-MM-dd HH:mm:ss

  #jackson配置
  jackson:
    # 日期格式化
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: GMT+8
    serialization:
      # 格式化输出
      INDENT_OUTPUT: false
      # 忽略无法转换的对象
      fail_on_empty_beans: false
    deserialization:
      # 允许对象忽略json中不存在的属性
      fail_on_unknown_properties: false


  # ====================================================================== spring -> could 相关配置
  cloud:
    # sentinel 配置
    # sentinel:
    #   # sentinel 开关
    #   enabled: true
    #   # 取消控制台懒加载
    #   eager: true
    #   transport:
    #     # dashboard控制台服务名 用于服务发现
    #     # 如无此配置将默认使用下方 dashboard 配置直接注册
    #     server-name: ruoyi-sentinel-dashboard
    #     # 客户端指定注册的ip 用于多网卡ip不稳点使用
    #     # client-ip:
    #     # 控制台地址 从1.3.0开始使用 server-name 注册
    #     # dashboard: localhost:8718


  # ====================================================================== spring -> redis 相关配置
  # redis 通用配置 子服务可以自行配置进行覆盖
  data:
    redis:
      # laixueshi.cn  除了项目在服务器上域名可以代替ip；本地运行不行，但可以在host新增域名映射ip可实现
      host: localhost
      port: 6379
      # 密码(如没有密码请注释掉password字段)
      password:
      database: 0
      timeout: 5s
      connect-timeout: 5s
      ssl:
        enabled: false
      lettuce:
        pool:
          enabled: true
          max-active: 16
          max-idle: 8
          min-idle: 2
          max-wait: 3s
        shutdown-timeout: 100ms


  # ====================================================================== spring -> elasticsearch 相关配置
  elasticsearch:
    # Elasticsearch HTTP 地址列表；本地服务访问服务器 ES 时填写服务器可达地址。
    uris:
      # 单节点地址；集群可继续追加多个地址。
      - http://127.0.0.1:9200
    # Elasticsearch 基础认证用户名。
    username: elastic
    # Elasticsearch 基础认证密码；生产环境应使用 Nacos 加密配置或密钥管理服务。
    password: elastic
    # 建立 TCP 连接的超时时间。
    connection-timeout: 3s
    # 已建立连接后，等待 Elasticsearch 响应的最大时间。
    socket-timeout: 30s



# ====================================================================== redisson 配置
redisson:
  # redis key前缀
  keyPrefix:
  # 线程池数量
  threads: 4
  # Netty线程池数量
  nettyThreads: 8
  # 单节点配置
  singleServerConfig:
    # 客户端名称
    clientName: ${spring.application.name}
    # 最小空闲连接数
    connectionMinimumIdleSize: 8
    # 连接池大小
    connectionPoolSize: 32
    # 连接空闲超时，单位：毫秒
    idleConnectionTimeout: 10000
    # 命令等待超时，单位：毫秒
    timeout: 3000
    # 发布和订阅连接池大小
    subscriptionConnectionPoolSize: 50



# ====================================================================== rocketmq 配置
rocketmq:
  # 集群部署时使用分号分隔多个 NameServer；生产环境填写内网地址。
  name-server: 127.0.0.1:9876
  producer:
    # 每个服务一个稳定的 Producer Group，禁止按请求动态生成。
    group: ${spring.application.name}-producer
    # 同步发送消息等待 Broker 响应的最大时间，单位毫秒。
    send-message-timeout: 5000


# ====================================================================== XXL-JOB 官方客户端配置
xxl:
  job:
    # 业务服务执行器的总开关；各服务可在自己的环境配置中覆盖 executor 配置。
    enabled: false
    # 调度中心与执行器通信密钥；生产环境使用 Nacos 加密或密钥管理服务注入。
    access-token: 建议随机32位token



# ====================================================================== springdoc 配置
springdoc:
  api-docs:
    # 是否开启接口文档
    enabled: true
  swagger-ui:
    # 持久化认证数据
    persistAuthorization: true




# ====================================================================== flycloud 全局相关配置
# 除 Spring Boot、Spring Cloud 和第三方组件的官方配置入口外，项目自定义配置统一收敛在 flycloud 下。
# note：本项目为了方便整合了在一起，但正式的规范应该抽出来，比如： es配置 -> flycloud-elasticsearch-client.yam；recketmq配置 -> flycloud-rocketmq-client.yaml；im配置 -> flycloud-im.yaml等等

flycloud:

  # ====================================================================== flycloud -> security 相关配置
  security:
    auth:

      # token配置
      token:
        # 登录态有效期，单位秒，默认2小时；接口请求认证成功后会滑动续期
        login-timeout-seconds: 7200
        # refresh token 有效期，默认30天，单位秒
        refresh-token-timeout-seconds: 2592000

      # feign配置
      feign:
        # 是否启用服务间Feign内部接口签名验证
        enabled: true
        # Feign内部接口签名密钥，各个服务必须保持一致
        secret: flycloud-feign-secret
        # Feign签名时间戳有效期，单位秒
        expire-seconds: 300

      # 白名单配置 (授权、swagger、监控中心等url)
      ignore-urls:
        - /admin/auth/**
        - /app/auth/**
        - /captcha/**
        - /app/**
        - /gen/**
        - /static/**
        - /actuator/**
        - /webjars/**
        - /druid/**
        - /assets/**
        - /css/**
        - /swagger-ui/index.html
        - /swagger-ui.html
        - /swagger-ui/**
        - /swagger/api-docs
        - /swagger-resources/**
        - /doc.html
        - /v2/api-docs/**
        - /v3/api-docs
        - /v3/api-docs/**
        # 积木报表静态资源由网关根路径转发；报表接口自行使用 token 参数或 X-Access-Token 校验。
        - /jmreport/**
        - /drag/**
        - /jimubi/**

      # 是否启用网关验证（是：经过网关的接口都拦截验证；否：全部接口在网关服务都为白名单）
      gateway-enable: true

    # ras密钥对配置
    rsa:
      keys:
        # 登录密码
        fly_cloud_login_password:
          public-key: 
          private-key: 对应key

        # 支付密码
        fly_cloud_pay_password:
          public-key: 
          private-key: 对应key

        # 开放接口
        fly_cloud_open_api:
          public-key: 
          private-key: 对应key



  # ====================================================================== flycloud -> 上传 相关配置
  upload:
    config:

      # 使用的服务器类型 (1:本地服务, 2:ftp服务器, 3:sftp服务器, 4:阿里云oss对象存储, 5:华为云obs对象存储, 9:smb共享文件夹)
      use-server-type: 3

      # sftp服务器配置
      local-server-config:
        # 文件上传和读取的前缀真实路径
        base-path: /Users/lxs/applicationFile/file/person/flycloud-server/
        # 拼给前端或客户端展示的前缀url路径
        base-url: http://localhost:8080/static/

      # sftp服务器配置
      sftp-server-config:
        ip: localhost
        user: root
        password: root
        port: 22
        base-path: /project/upload-file/
        # base-url: https://www.laixueshi.cn/static/
        base-url: http://localhost:8888/static/



  # ====================================================================== flycloud -> elasticsearch 相关配置
  elasticsearch:
    # Elasticsearch 公共能力总开关；关闭后不注册 Flycloud 的 ES 基础设施 Bean。
    enabled: true
    # 未显式指定分页大小时使用的默认每页条数。
    default-page-size: 10
    # 单次搜索允许的最大每页条数，防止大分页拖垮集群。
    max-page-size: 100
    # Bulk 写入时单批最多包含的文档数。
    bulk-size: 500
    # Bulk 请求失败后的最大重试次数。
    bulk-retry-times: 3
    # Bulk 请求失败后的两次重试间隔。
    bulk-retry-interval: 1s
    # 索引版本升级后，旧版本索引的建议观察保留天数。
    index-retention-days: 7
    # 是否强制一个业务 Alias 同时只能指向一个真实写索引。
    alias-require-single-index: true
    # 命中量超过该阈值时，分页查询应改用 search_after。
    search-after-threshold: 10000
    # 单个业务索引全量同步时允许的最大并发数。
    full-sync-concurrency: 1
    # Bulk 写入完成后是否立即 refresh，使写入数据可被后续搜索读取。
    refresh-after-bulk: true



  # ====================================================================== flycloud -> seata 客户端治理配置
  # Seata 官方 seata.* 属性由 flycloud-common-seata 的桥接配置读取本节并映射，业务服务无需再导入独立 Data ID。
  seata:
    # Seata 客户端总开关；关闭后不创建 TM/RM 和数据源代理相关能力。
    enabled: true
    # 事务服务组名称；必须与下方 vgroup-mapping 的键一致。
    tx-service-group: flycloud-tx-group
    service:
      vgroup-mapping:
        # 事务服务组到 TC 集群名的映射；default 必须与 Seata Server 注册集群一致。
        flycloud-tx-group: default
      # TC 不可用时是否降级为本地事务；生产环境通常保持关闭以避免静默失去分布式事务。
      enable-degrade: false
      # 全局事务禁用开关；true 时 @GlobalTransactional 不再创建全局事务。
      disable-global-transaction: false
    client:
      rm:
        # RM 异步提交分支事务的缓冲队列上限。
        async-commit-buffer-limit: 10000
        # RM 向 TC 上报分支状态失败后的重试次数。
        report-retry-count: 5
        # 是否校验业务表元数据，防止表结构变化造成 AT 回滚异常。
        table-meta-check-enable: true
        # 表元数据定时校验间隔，单位毫秒。
        table-meta-checker-interval: 60000
        # AT 模式 SQL 解析器实现。
        sql-parser-type: druid
        # 分支事务成功后是否主动向 TC 发送成功上报。
        report-success-enable: false
        lock:
          # 全局锁冲突后的单次等待间隔，单位毫秒。
          retry-interval: 10
          # 全局锁冲突后的最大重试次数。
          retry-times: 30
          # 遇到全局锁冲突时，是否回滚当前分支事务。
          retry-policy-branch-rollback-on-conflict: true
      tm:
        # TM 提交全局事务失败后的最大重试次数。
        commit-retry-count: 5
        # TM 回滚全局事务失败后的最大重试次数。
        rollback-retry-count: 5
        # 未在注解中指定时的全局事务默认超时，单位毫秒。
        default-global-transaction-timeout: 60000
        # 是否启用 TM 降级检测。
        degrade-check: false
        # TM 降级检测周期，单位毫秒。
        degrade-check-period: 2000
        # 连续失败达到该次数后允许进入降级。
        degrade-check-allow-times: 10
      undo:
        # 回滚时是否校验前后镜像数据，发现脏写时拒绝自动回滚。
        data-validation: true
        # undo_log 日志序列化方式。
        log-serialization: jackson
        # 每个参与 AT 事务的业务库中使用的 Undo Log 表名。
        log-table: undo_log
        # 是否仅记录 UPDATE 语句实际变更的列，减少 undo_log 体积。
        only-care-update-columns: true
        compress:
          # 是否压缩达到阈值的 undo_log 内容。
          enable: true
          # undo_log 压缩算法。
          type: zip
          # 触发 undo_log 压缩的内容大小阈值。
          threshold: 64k



  # ====================================================================== flycloud -> rocketmq 相关配置
  rocketmq:
    # 全局开关；不使用 RocketMQ 时统一关闭；不会创建生产者、消费者和本地消息调度器。
    enabled: true
    outbox:
      # 本地消息表调度开关；关闭后不会扫描或投递 mq_outbox_message 中的待发送消息。
      enabled: true
      # 本地消息表轮询间隔，单位毫秒；每轮结束后等待该时长再执行下一轮。
      dispatch-delay-millis: 10000
      # 每轮扫描并尝试投递的最大消息数量。
      batch-size: 100
      # 单条本地消息允许的最大失败重试次数，超过后由人工或补偿任务处理。
      max-retry-count: 16
      # 多实例条件抢占后的租约；实例异常退出时，租约到期后可重新投递。
      claim-lease-seconds: 60



  # ====================================================================== flycloud -> websocket 配置
  websocket:
    enabled: true
    # 此处path: /ws目前由flycloud-system统一引入websocket模块实现，其他服务调用api接口WebSocketSenderApi即可
    path: /ws
    # local、redis；local：单机部署，如flycloud-system 只有一个实例
    sender-type: local



  # ====================================================================== flycloud -> IM 相关配置
  im:
    # 好友配置
    friend:
      # 是否自动同意好友申请；生产环境通常关闭，必须由接收方确认
      auto-accept: false

    # 群聊配置
    group:
      # 单个群聊最大成员数
      max-member: 500
      # 单个群聊管理员数量上限
      admin-max-count: 3
      # 单个群聊置顶消息数量上限
      pin-max-count: 5

    # 表情配置
    face:
      # 每位用户可保存的个人表情数量上限
      user-item-max-count: 200

    # 消息配置
    message:
      # 是否启用私聊已读和群聊已读回执
      private-read-enabled: true
      group-read-enabled: true
      # 单次离线增量拉取的最大消息数量
      max-pull-size: 1000
      # 消息撤回时限，单位：分钟
      recall-timeout-minutes: 5
      # 私聊、群聊离线消息补偿窗口，单位：天
      private-pull-max-days: 30
      group-pull-max-days: 30

    # 实时音视频配置；媒体由 LiveKit SFU 转发，后端只负责 Token 签发与 IM 信令
    rtc:
      # 是否启用实时音视频通话
      enabled: true
      # LiveKit 客户端连接地址；本地默认端口 7880（如：ws://127.0.0.1:7880）；生产环境使用公网wss地址（如：wss://www.laixueshi.cn/livekit ）
      livekit-url: wss://localhost/livekit
      # 必须与 LiveKit 服务端 livekit.yaml 的 keys 配置保持一致
      api-key: flycloud_livekit_key
      # 本地开发示例密钥；生产环境改为至少 32 位强随机值，并仅保存在 Nacos / 密钥管理服务
      api-secret: 建议随机32位
      # 单次签发的 LiveKit Token 有效期，单位：小时
      token-ttl-hours: 6
      # 群通话最大同时在房人数
      group-max-participants: 16
      # 无人且未结束的通话清理阈值，单位：分钟
      cleanup-zombie-threshold-minutes: 5
      # 被叫未接听的振铃超时阈值，单位：分钟
      invite-timeout-minutes: 1


  # ====================================================================== flycloud -> swagger 相关配置
  swagger:
    enabled: true
    title: Fly Swagger API
    gateway: http://localhost:8080
    token-url: ${flycloud.swagger.gateway}/auth/oauth/token
    scope: server
    services:
      flycloud-gateway: flycloud-gateway
      flycloud-system: flycloud-system
      flycloud-mall: flycloud-mall
      flycloud-music: flycloud-music
      flycloud-generator: flycloud-generator
      flycloud-job: flycloud-job
      flycloud-test: flycloud-test
