# Seata 2.5.0 官方客户端属性桥接。
# 业务参数统一维护在 Nacos application-common.yaml 的 flycloud.seata 下；本文件只保留
# Seata Starter 识别的 seata.* 键，禁止再创建独立的 Seata 客户端 Nacos Data ID。
seata:
  enabled: ${flycloud.seata.enabled:true}
  application-id: ${spring.application.name}
  tx-service-group: ${flycloud.seata.tx-service-group:flycloud-tx-group}

  service:
    vgroup-mapping:
      flycloud-tx-group: ${flycloud.seata.service.vgroup-mapping.flycloud-tx-group:default}
    enable-degrade: ${flycloud.seata.service.enable-degrade:false}
    disable-global-transaction: ${flycloud.seata.service.disable-global-transaction:false}

  client:
    rm:
      async-commit-buffer-limit: ${flycloud.seata.client.rm.async-commit-buffer-limit:10000}
      report-retry-count: ${flycloud.seata.client.rm.report-retry-count:5}
      table-meta-check-enable: ${flycloud.seata.client.rm.table-meta-check-enable:true}
      table-meta-checker-interval: ${flycloud.seata.client.rm.table-meta-checker-interval:60000}
      sql-parser-type: ${flycloud.seata.client.rm.sql-parser-type:druid}
      report-success-enable: ${flycloud.seata.client.rm.report-success-enable:false}
      lock:
        retry-interval: ${flycloud.seata.client.rm.lock.retry-interval:10}
        retry-times: ${flycloud.seata.client.rm.lock.retry-times:30}
        retry-policy-branch-rollback-on-conflict: ${flycloud.seata.client.rm.lock.retry-policy-branch-rollback-on-conflict:true}
    tm:
      commit-retry-count: ${flycloud.seata.client.tm.commit-retry-count:5}
      rollback-retry-count: ${flycloud.seata.client.tm.rollback-retry-count:5}
      default-global-transaction-timeout: ${flycloud.seata.client.tm.default-global-transaction-timeout:60000}
      degrade-check: ${flycloud.seata.client.tm.degrade-check:false}
      degrade-check-period: ${flycloud.seata.client.tm.degrade-check-period:2000}
      degrade-check-allow-times: ${flycloud.seata.client.tm.degrade-check-allow-times:10}
    undo:
      data-validation: ${flycloud.seata.client.undo.data-validation:true}
      log-serialization: ${flycloud.seata.client.undo.log-serialization:jackson}
      log-table: ${flycloud.seata.client.undo.log-table:undo_log}
      only-care-update-columns: ${flycloud.seata.client.undo.only-care-update-columns:true}
      compress:
        enable: ${flycloud.seata.client.undo.compress.enable:true}
        type: ${flycloud.seata.client.undo.compress.type:zip}
        threshold: ${flycloud.seata.client.undo.compress.threshold:64k}

  # TC 注册中心属于 Seata 官方配置，连接参数复用 Spring Cloud Nacos。
  registry:
    type: nacos
    nacos:
      application: seata-server
      server-addr: ${spring.cloud.nacos.server-addr}
      namespace: ${spring.cloud.nacos.discovery.namespace:}
      group: SEATA_GROUP
      cluster: default
      username: ${spring.cloud.nacos.username:nacos}
      password: ${spring.cloud.nacos.password:nacos}

  # dynamic-datasource 负责创建 AT 数据源代理，避免 Seata Starter 二次代理。
  enable-auto-data-source-proxy: false
  data-source-proxy-mode: AT

spring:
  datasource:
    dynamic:
      seata: ${flycloud.seata.enabled:true}
